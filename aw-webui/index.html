<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ActivityWatch</title>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/logo.png">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <!-- Verify with https://csp-evaluator.withgoogle.com/ -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' <%= htmlWebpackPlugin.options.templateParameters.cspDefaultSrc %> https://api.github.com/repos/ActivityWatch/activitywatch/releases/latest; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; object-src 'none'; script-src 'self' 'unsafe-eval'">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but the ActivityWatch Web UI doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- We can build the app with either Vite or Webpack, they inject in different ways -->
    <!-- Vite will auto-inject here: VITE_AUTOINJECT -->
  </body>
</html>
