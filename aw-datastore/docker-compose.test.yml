version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aw-datastore-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: aw_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d aw_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - test-network

volumes:
  postgres_data:

networks:
  test-network:
    driver: bridge
